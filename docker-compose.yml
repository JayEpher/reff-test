# 方案 B：单服务器多环境 docker-compose 配置
# 此文件仅作为基础模板，实际部署时会被 Jenkinsfile 生成的 docker-compose.override.yml 覆盖

version: '3.8'

services:
  # Activities 应用
  activities:
    image: ${HARBOR_URL}/${HARBOR_PROJECT}/activities:latest
    container_name: puff-activities
    restart: unless-stopped
    networks:
      - puff-network

  # Admin System 1
  admin-system-1:
    image: ${HARBOR_URL}/${HARBOR_PROJECT}/admin-system-1:latest
    container_name: puff-admin-1
    restart: unless-stopped
    networks:
      - puff-network

  # Admin System 3
  admin-system-3:
    image: ${HARBOR_URL}/${HARBOR_PROJECT}/admin-system-3:latest
    container_name: puff-admin-3
    restart: unless-stopped
    networks:
      - puff-network

  # DApp (Next.js)
  dapp:
    image: ${HARBOR_URL}/${HARBOR_PROJECT}/dapp:latest
    container_name: puff-dapp
    restart: unless-stopped
    networks:
      - puff-network

networks:
  puff-network:
    driver: bridge
